<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة التطبيقات</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .app-card { background: white; padding: 15px; width: 220px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .app-card img { width: 80px; height: 80px; object-fit: contain; }
        .app-card a { display: block; margin-top: 10px; padding: 8px; background: #007bff; color: white; text-decoration: none; border-radius: 20px; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; }
    </style>
</head>
<body>
<h1>📦 مكتبة التطبيقات</h1>
<div id="app-container" class="container"></div>
<a href="admin.html" class="admin-btn">🔧 لوحة التحكم</a>

<script>
    // 🔴 الرابط الذي أخذته من jsonkeeper
    const BIN_URL = "https://jsonkeeper.com/b/MR0JT";
    
    fetch(BIN_URL)
        .then(res => res.json())
        .then(data => {
            const apps = data.apps || [];
            const container = document.getElementById('app-container');
            if (apps.length === 0) {
                container.innerHTML = '<p>لا توجد تطبيقات حالياً.</p>';
            } else {
                apps.forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.innerHTML = `
                        <img src="${app.image}" onerror="this.src='https://via.placeholder.com/80'">
                        <h3>${app.name}</h3>
                        <p>${app.desc}</p>
                        <a href="${app.link}" target="_blank">تحميل</a>
                    `;
                    container.appendChild(card);
                });
            }
        })
        .catch(() => {
            document.getElementById('app-container').innerHTML = '<p style="color:red;">⚠️ خطأ في التحميل</p>';
        });
</script>
</body>
</html>
